<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Grand Strategy 1939 Alpha 1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body {height:100%;margin:0;padding:0;background:#232834;color:#fff;font-family:system-ui,sans-serif;}
    body {display:flex;flex-direction:column;min-height:100vh;}
    .topbar {background:#181c22;padding:8px 0 0;display:flex;flex-direction:column;align-items:center;min-height:60px;}
    .resources {display:flex;gap:16px;font-size:1.08em;justify-content:center;flex-wrap:wrap;}
    .main {flex:1 1 auto;display:flex;flex-direction:row;align-items:stretch;justify-content:stretch;}
    .sidebar {width:56px;background:#222a32;display:flex;flex-direction:column;align-items:center;padding:9px 0 7px;gap:17px;font-size:1.5em;min-width:56px;}
    .midpanel {flex:1 1 auto;display:flex;flex-direction:column;align-items:stretch;}
    .infopanel {width:220px;background:#232a38;display:flex;flex-direction:column;align-items:stretch;padding:7px 9px;}
    .month {font-size:1.05em;text-align:center; font-weight:bold;}
    .citylist {margin:0;margin-bottom:15px;}
    .cityblock {background:#263348;padding:7px 4px 5px;border-radius:8px;margin-bottom:9px;}
    .cityblock .name {font-weight:bold;}
    .cityblock .spec {font-size:.96em;color:#aad;}
    .cityblock .income {font-size:.98em;color:#eee;}
    .cityblock .buildq {margin:3px 0;font-size:.95em;}
    .cityblock .prodq {margin:3px 0;font-size:.95em;}
    .cityblock .pop {font-size:.97em;color:#aaa;}
    .cityblock .garn {font-size:.97em;color:#c9a;}
    .queueitem {padding:2px 0;}
    .bottompanel {width:100%;padding:13px 0 9px;background:#1b1d21;border-top:1px solid #24273d;text-align:center;}
    .btn {padding:7px 13px;border-radius:8px;background:#3c5c7a;color:#fff;border:none;font-size:1em;margin:0 7px;}
    .btn:active {background:#56aee1;}
    .log {width:100%;min-height:42px;text-align:center;font-size:1.08em;color:#fec;background:#2a252e97;border-radius:7px;margin-top:4px;}
    .startmenu,.settingsmenu {position:fixed;top:0;left:0;width:100vw;height:100vh;background:#192031e9;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;}
    .startmenu h1 {font-size:2.2em;}
    .startmenu label {display:block;margin:8px 0 6px;}
    .startmenu select {font-size:1em;padding:6px;border-radius:7px;background:#191d2e;color:#fff;border:none;}
    .startmenu button {font-size:1.09em;padding:10px 22px;margin-top:18px;border-radius:8px;background:#49c;border:none;color:#fff;}
    .startmenu .ver {font-size:1.18em;opacity:0.7;font-family:monospace;margin-bottom:10px;}
    .settingsmenu {display:none;font-size:1.1em;}
    .settingsmenu label {margin-top:8px; margin-bottom:4px;}
    @media (max-width:600px){
      .main{flex-direction:column;}
      .infopanel{width:98vw;max-width:98vw;}
      .sidebar{width:44px;min-width:44px;font-size:1.25em;}
    }
  </style>
</head>
<body>
<div class="startmenu" id="startMenu">
    <div class="ver">Alpha 1 (0.1)</div>
    <h1>Grand Strategy 1939</h1>
    <button onclick="startNewGame()">Новая игра</button>
    <button onclick="continueGame()">Продолжить</button>
    <button onclick="openSettings()">Настройки</button>
</div>
<div class="settingsmenu" id="settingsMenu">
    <h2>Настройки</h2>
    <label>Сложность:</label>
    <select id="difficultyPick">
      <option value="normal">Нормальная</option>
      <option value="easy">Лёгкая</option>
      <option value="hard">Жесткая</option>
    </select>
    <button onclick="closeSettings()" class="btn" style="margin-top:18px;">Закрыть</button>
</div>
<div class="topbar" id="topBar" style="display:none;">
    <div class="month" id="monthText"></div>
    <div class="resources" id="resPanel"></div>
</div>
<div class="main" id="mainPanel" style="display:none;">
    <div class="sidebar">
        <button class="btn" title="Государство" onclick="openPanel('state')">🏛</button>
        <button class="btn" title="Города" onclick="openPanel('cities')">🏭</button>
        <button class="btn" title="Армии" onclick="openPanel('armies')">⚔</button>
        <button class="btn" title="Исследования" onclick="openPanel('tech')">🔬</button>
        <button class="btn" title="Дипломатия" onclick="openPanel('diplo')">🤝</button>
        <button class="btn" title="События" onclick="openPanel('events')">📜</button>
        <button class="btn" title="Статистика" onclick="openPanel('stats')">📊</button>
        <button class="btn" title="Настройки" onclick="openPanel('settings')">⚙</button>
    </div>
    <div class="midpanel" id="midPanel"></div>
    <div class="infopanel" id="infoPanel"></div>
</div>
<div class="bottompanel" id="bottomPanel" style="display:none;">
    <button class="btn" id="btnEndTurn">Завершить ход</button>
</div>
<script>
// СТРУКТУРА ДАННЫХ — модульная! 
const GAME_VERSION = 'Alpha 1 (0.1)';
const months = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const countries = {
  france: {
    name: "Франция", code: "france",
    cities: [
      {name:"Париж",pop:3100000,income:34,garrison:500,special:"исследования, экономика"},
      {name:"Лион",pop:500000,income:21,garrison:180,special:"универсальный"},
      {name:"Лилль",pop:220000,income:20,garrison:150,special:"промышленность"},
      {name:"Марсель",pop:800000,income:22,garrison:200,special:"флот"},
      {name:"Бордо",pop:270000,income:15,garrison:80,special:"логистика"}
    ],
    start: {money:120,materials:90,military:25,political:20},
    armies:[],techs:[],ai:true
  },
  germany: {
    name: "Германия", code: "germany",
    cities: [
      {name:"Берлин",pop:4100000,income:35,garrison:600,special:"столица"},
      {name:"Мюнхен",pop:620000,income:28,garrison:210,special:"пехота"},
      {name:"Гамбург",pop:1400000,income:27,garrison:220,special:"флот"},
      {name:"Кёльн",pop:770000,income:24,garrison:140,special:"логистика"},
      {name:"Франкфурт",pop:540000,income:20,garrison:120,special:"экономика"}
    ],
    start: {money:130,materials:92,military:28,political:19},
    armies:[],techs:[],ai:true
  }
  // другие страны добавляются аналогично!
};
const techTree = [
  {id:"econ1",cat:"Экономика",title:"Экономические реформы",desc:"+10% доход",cost:20,duration:2},
  {id:"mil1",cat:"Пехота",title:"Новое снаряжение",desc:"+10% гарнизон",cost:18,duration:2},
  {id:"tank1",cat:"Танки",title:"Мехдивизии",desc:"Открывает производство танков",cost:22,duration:3}
];
// ------------------ GAME STATE -----------------
let game = null;
let menuState = 'main';
let lastPanel = 'cities';
// ------------------ MENU LOGIC -----------------
function startNewGame(){
  document.getElementById("startMenu").innerHTML=
    `<div class="ver">${GAME_VERSION}</div><h1>Grand Strategy 1939</h1>
    <label>Страна:</label>
    <select id="countrySelect"><option value="france">Франция</option><option value="germany">Германия</option></select>
    <label>Кампания:</label>
    <select id="campSelect"><option value="default">1939: Начало войны</option></select>
    <label>Сложность:</label>
    <select id="diffSelect"><option value="normal">Нормальная</option><option value="easy">Лёгкая</option><option value="hard">Жесткая</option></select>
    <button onclick="launchGame()" style="margin-top:18px;">Начать игру</button>
    <button onclick="resetMenu()" style="margin-top:12px;">← Назад</button>`;
}
function continueGame(){
  let saved = localStorage.getItem("gs1939save");
  if(!saved){showMenuLog("Нет сохранения.");return;}
  launchGame(saved);
}
function openSettings(){
  document.getElementById("settingsMenu").style.display='flex';
  document.getElementById("startMenu").style.display='none';
}
function closeSettings(){
  document.getElementById("settingsMenu").style.display='none';
  document.getElementById("startMenu").style.display='flex';
}
function resetMenu(){
  document.getElementById("startMenu").innerHTML=
    `<div class="ver">${GAME_VERSION}</div><h1>Grand Strategy 1939</h1>
    <button onclick="startNewGame()">Новая игра</button>
    <button onclick="continueGame()">Продолжить</button>
    <button onclick="openSettings()">Настройки</button>`;
}
function openPanel(panel){
  lastPanel = panel;
  renderMidPanel();
}
// ------------------ GAME START -----------------
function launchGame(saved){
  document.getElementById("startMenu").style.display="none";
  document.getElementById("settingsMenu").style.display="none";
  document.getElementById("topBar").style.display="";
  document.getElementById("mainPanel").style.display="";
  document.getElementById("bottomPanel").style.display="";
  if(saved){
    game = JSON.parse(saved);
    showLog("Игра загружена.");
  } else {
    let country = document.getElementById("countrySelect").value;
    let campaign = document.getElementById("campSelect").value;
    let diff = document.getElementById("diffSelect").value;
    game = {
      country,
      campaign,
      diff,
      turn:1,
      year:1939,
      month:0,
      res: {...countries[country].start},
      cities: countries[country].cities.map(c=>({
        ...c,
        buildQ:[],prodQ:[],buildBusy:null,prodBusy:null
      })),
      techsUnlocked:[],
      techInProgress:null,
      armies:[],
      log:"Новая игра началась!"
    };
    saveGame();
  }
  renderGame();
}
// ----------------- SAVE --------------------------
function saveGame(){
  localStorage.setItem("gs1939save", JSON.stringify(game));
}
function showMenuLog(msg){
  document.getElementById("startMenu").innerHTML+=`<div class="log">${msg}</div>`;
}
// ---------------- RENDERING ----------------------
function renderGame(){
  document.getElementById("monthText").innerText=
    months[game.month]+" "+game.year+", "+countries[game.country].name;
  renderResPanel();
  renderMidPanel();
  renderInfoPanel();
  showLog(game.log||'',true);
}
function renderResPanel(){
  let r=game.res;
  document.getElementById("resPanel").innerHTML=
    `💰 <b>${r.money}</b> | ⛏ <b>${r.materials}</b> | ⚔ <b>${r.military}</b> | 🏛 <b>${r.political}</b>`;
}
function renderMidPanel(){
  let el=document.getElementById("midPanel");
  switch(lastPanel){
    case 'cities': renderCitiesMid(el); break;
    case 'state': el.innerHTML=`<div style='font-size:1.16em;padding:14px;'>Государство: ${countries[game.country].name}<br>Ресурсы: <br>💰${game.res.money} ⛏${game.res.materials} ⚔${game.res.military} 🏛${game.res.political}</div>`; break;
    case 'tech': renderTechMid(el); break;
    case 'armies': el.innerHTML="<div style='font-size:1.1em;padding:14px;'>Армии: пока не реализовано</div>";break;
    case 'diplo': el.innerHTML="<div style='font-size:1.1em;padding:14px;'>Дипломатия: пока не реализовано</div>";break;
    case 'events': el.innerHTML="<div style='font-size:1.1em;padding:14px;'>События: пока не реализовано</div>";break;
    case 'stats': el.innerHTML="<div style='font-size:1.1em;padding:14px;'>Статистика: пока не реализовано</div>";break;
    case 'settings': openSettings(); break;
    default: renderCitiesMid(el);
  }
}
function renderCitiesMid(el){
  let html = "<h2 style='margin-top:5px;'>Города</h2><div class='citylist'>";
  game.cities.forEach((city,i)=>{
    html+=`<div class='cityblock'>
      <span class="name">${city.name}</span> <span class="pop">👥${city.pop}</span><br>
      <span class="income">💰${city.income}/мес</span> <span class="garn">⚔${city.garrison} гарнизон</span>
      <br><span class="spec">${city.special}</span>
      <div class="buildq">
      Стройка: ${city.buildBusy?`<b>${city.buildBusy.name} (${city.buildBusy.left}м)</b>`:"—"}
      <br>Очередь: ${city.buildQ.map(q=>`<span class="queueitem">${q.name} (${q.time}м)</span>`).join(', ')}
      <br><button class="btn" onclick="addBuild(${i})">+Стройка</button>
      </div>
      <div class="prodq">
      Производство: ${city.prodBusy?`<b>${city.prodBusy.name} (${city.prodBusy.left}м)</b>`:"—"}
      <br>Очередь: ${city.prodQ.map(q=>`<span class="queueitem">${q.name} (${q.time}м)</span>`).join(', ')}
      <br><button class="btn" onclick="addProd(${i})">+Производство</button>
      </div>
    </div>`;
  });
  html+="</div>";
  el.innerHTML=html;
}
function renderTechMid(el){
  let me = game.techsUnlocked, inPr = game.techInProgress;
  let html = "<h2>Технологии</h2><div>";
  techTree.forEach(tech=>{
    let unlocked = me.includes(tech.id), inprog=(inPr&&inPr.id==tech.id);
    html+=`<div style="margin:4px 0;padding:7px;border-radius:7px;background:#193;color:${unlocked?'#ffe':'#fff'};">
      <b>${tech.title}</b> <span style="opacity:.7;font-size:.97em;">(${tech.cat})</span><br>
      <small>${tech.desc}</small><br>
      ${unlocked?'<span>Открыта</span>':inprog?`<span>В процессе (${inPr.left}м)</span>`:`<button class="btn" onclick="startTech('${tech.id}')">Исследовать (${tech.cost}⚔, ${tech.duration}мес)</button>`}
      </div>`;
  });
  html+="</div>";
  el.innerHTML = html;
}
function renderInfoPanel(){
  let el=document.getElementById('infoPanel');
  el.innerHTML=
    `<div style="font-size:1.16em;margin-bottom:8px;">Информация<br><b>${countries[game.country].name}</b></div>
    <div>Ход: <b>${game.turn}</b></div>
    <div>Месяц: <b>${months[game.month]} ${game.year}</b></div>
    <div>Сложность: <b>${game.diff}</b></div>
    <div>Текущая технология: ${game.techInProgress?game.techInProgress.title+' ('+game.techInProgress.left+'мес)':'—'}</div>
    <div>Кампания: <b>${game.campaign}</b></div>`;
}
function showLog(msg,panel){
  let l=document.getElementById('midPanel');
  if(panel) l.innerHTML+='<div class="log">'+msg+'</div>';
  else {
    let logs=document.querySelectorAll(".log");
    for(let lg of logs) lg.remove();
    let el=document.getElementById('mainPanel');
    let logDiv=document.createElement("div");logDiv.className="log";logDiv.innerHTML=msg;
    el.appendChild(logDiv);
    setTimeout(()=>{logDiv.remove();},3500);
  }
}
// ----------------- BUILD / PRODUCE -----------------
const buildOptions = [
  {name:"Гражданский завод",cost:22,time:2,effect:"💰+8/мес"},
  {name:"Военный завод",cost:28,time:3,effect:"⚔+4/мес"},
  {name:"Укрепления",cost:13,time:2,effect:"Защита"}
];
const prodOptions = [
  {name:"Пехотная дивизия",cost:12,time:2,need:"—"},
  {name:"Танковая дивизия",cost:21,time:3,need:"tank1"},
  {name:"Артиллерия",cost:14,time:2,need:"mil1"}
];
function addBuild(i){
  let city=game.cities[i];
  let optList = buildOptions.map((b,j)=>
    `<button class="btn" onclick="chooseBuild(${i},${j})">${b.name} (${b.cost}⛏, ${b.time}м)</button>`
  ).join('<br>')
  showLog(`<b>Выберите объект для строительства в ${city.name}:</b><br>${optList}`,true);
}
function chooseBuild(i,j){
  let city=game.cities[i], opt=buildOptions[j];
  if(game.res.materials<opt.cost){showLog('Недостаточно материалов!',true);return;}
  game.res.materials-=opt.cost;
  city.buildQ.push({name:opt.name,time:opt.time,left:opt.time,effect:opt.effect});
  showLog('Стройка добавлена.',true);renderGame();
  saveGame();
}
function addProd(i){
  let city=game.cities[i];
  let optList = prodOptions.map((b,j)=>
    b.need&&(!game.techsUnlocked.includes(b.need))?'':`<button class="btn" onclick="chooseProd(${i},${j})">${b.name} (${b.cost}⛏, ${b.time}м)</button>`
  ).join('<br>');
  showLog(`<b>Выберите тип войск для производства в ${city.name}:</b><br>${optList||'Нет вариантов'}<br>`,true);
}
function chooseProd(i,j){
  let city=game.cities[i], opt=prodOptions[j];
  if(game.res.materials<opt.cost){showLog('Недостаточно материалов!',true);return;}
  game.res.materials-=opt.cost;
  city.prodQ.push({name:opt.name,time:opt.time,left:opt.time});
  showLog('Производство добавлено.',true);renderGame();
  saveGame();
}
// -------------------- TECH ---------------------------
function startTech(id){
  let tech = techTree.find(t=>t.id==id);
  if(game.res.military<tech.cost){showLog('Недостаточно военных очков.',true);return;}
  game.res.military-=tech.cost;
  game.techInProgress = {id:tech.id,title:tech.title,left:tech.duration};
  showLog('Исследование началось: '+tech.title,true);renderGame();
  saveGame();
}
function processTech(){
  if(game.techInProgress){
    game.techInProgress.left--;
    if(game.techInProgress.left<=0){
      game.techsUnlocked.push(game.techInProgress.id);
      showLog('Открыта технология: '+game.techInProgress.title,true);
      game.techInProgress=null;
    }
  }
}
// ------------- END TURN ------------------
document.getElementById("btnEndTurn").onclick=()=>{
  for(let c of game.cities){
    // Строительство
    if(!c.buildBusy && c.buildQ.length>0){
      c.buildBusy = c.buildQ.shift();
    }
    if(c.buildBusy){
      c.buildBusy.left--;
      if(c.buildBusy.left<=0){
        showLog(c.name+": завершена стройка "+c.buildBusy.name,true);
        if(c.buildBusy.effect && c.buildBusy.effect.indexOf("💰")!=-1){
          let plus=parseInt(c.buildBusy.effect.match(/(\+[\d]+)/)?c.buildBusy.effect.match(/(\+[\d]+)/)[1]:8);
          c.income+=plus;
        }
        c.buildBusy=null;
      }
    }
    // Производство
    if(!c.prodBusy && c.prodQ.length>0){
      c.prodBusy = c.prodQ.shift();
    }
    if(c.prodBusy){
      c.prodBusy.left--;
      if(c.prodBusy.left<=0){
        showLog(c.name+": произведена "+c.prodBusy.name,true);
        // TODO: army add logic
        c.prodBusy=null;
      }
    }
  }
  // Доход города
  let totalIncome = game.cities.reduce((sum,c)=>sum+c.income,0);
  game.res.money+=totalIncome;
  // Ход
  processTech();
  game.turn++;
  game.month++;
  if(game.month>=12){game.month=0;game.year++;}
  game.log="Ход завершён! Доход: "+totalIncome+"💰";
  renderGame();
  saveGame();
};
// ----------------- INIT ---------------------
resetMenu();
</script>
</body>
</html>
